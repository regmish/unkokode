<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Nepali typing extension icon</title>
  <desc id="desc">Letter A turning into the Nepali letter ka.</desc>
  <defs>
    <linearGradient id="bg" x1="12" y1="10" x2="118" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7ed" />
      <stop offset="1" stop-color="#fed7aa" />
    </linearGradient>
    <linearGradient id="arrow" x1="36" y1="64" x2="92" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c2d12" />
      <stop offset="1" stop-color="#c2410c" />
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)" />
  <rect x="8" y="8" width="112" height="112" rx="28" fill="none" stroke="#9a3412" stroke-opacity=".16" stroke-width="2" />
  <text x="34" y="77" font-size="44" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700" fill="#431407">A</text>
  <path d="M46 64h34" fill="none" stroke="url(#arrow)" stroke-linecap="round" stroke-width="8" />
  <path d="m74 49 18 15-18 15" fill="none" stroke="#c2410c" stroke-linecap="round" stroke-linejoin="round" stroke-width="8" />
  <text x="86" y="78" font-size="46" font-family="Noto Sans Devanagari, Kohinoor Devanagari, sans-serif" font-weight="700" fill="#6f1d1b">क</text>
</svg>
